name: aavin
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to

version: 1.0.0+2 # Android
#version: 1.0.0+15 # iOS

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.2
  http: ^1.5.0
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.7
  flip_card: ^0.7.0
  image_picker: ^1.2.0
  flutter_image_compress: ^2.3.0
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.0
  flutter_inappwebview: ^6.1.5
  photo_view: ^0.15.0
  image_cropper: ^11.0.0
  razorpay_flutter: ^1.4.0
  flutter_cashfree_pg_sdk: ^2.2.9+47
  webview_flutter_android: ^4.10.5
  webview_flutter_wkwebview: ^3.23.2
  package_info_plus: ^8.0.2
  device_info_plus: ^12.2.0
  get: ^4.7.3
  get_storage: ^2.1.1
  path_provider: ^2.1.5
  file_picker: ^8.1.6
  share_plus: ^12.0.1
  lottie: ^3.3.2
  flutter_launcher_icons: ^0.14.4
  syncfusion_flutter_core: ^32.2.9
  syncfusion_flutter_pdfviewer: ^32.2.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Bold.ttf